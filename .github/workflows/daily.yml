name: Daily Briefing

on:
  schedule:
    # 毎日 UTC 22:00 (JST 7:00) に実行
    - cron: '0 22 * * *'
  workflow_dispatch: # 手動実行も可能にします

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run generation script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        # GitHub SecretsにGMAIL_CREDENTIALSとしてJSONの中身を保存しておきます
        GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS }}
      run: |
        # Secretsから一時的なcredentials.jsonを作成
        echo "$GMAIL_CREDENTIALS_JSON" > credentials.json
        # 実際にはサーバー上での認証(token.json)が必要ですが、
        # 初期認証をローカルで済ませてtoken.jsonもSecretsに入れる運用が一般的です。
        python scripts/generate.py

    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add briefings/*.html index.html
        git commit -m "Add daily briefing for $(date +'%Y-%m-%d')" || exit 0
        git push
