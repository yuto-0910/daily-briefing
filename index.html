
    <!DOCTYPE html>
    <html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Daily Briefing Dashboard</title>
        <style>
            body { font-family: sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; background: #eee; }
            .tabs { background: #333; overflow-x: auto; white-space: nowrap; padding: 10px; display: flex; gap: 8px; }
            .tab-btn { background: #555; color: white; border: none; padding: 8px 16px; cursor: pointer; border-radius: 6px; transition: 0.3s; }
            .tab-btn.active { background: #007bff; font-weight: bold; }
            .tab-content { display: none; flex-grow: 1; }
            .tab-content.active { display: block; }
            iframe { border: none; width: 100%; height: 100%; background: white; }
        </style>
        <script>
            function showTab(id, btn) {
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(id).classList.add('active');
                btn.classList.add('active');
            }
        </script>
    </head>
    <body>
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('tab-2026-04-20', this)">2026-04-20</button><button class="tab-btn " onclick="showTab('tab-2026-04-19', this)">2026-04-19</button><button class="tab-btn " onclick="showTab('tab-2026-04-18', this)">2026-04-18</button><button class="tab-btn " onclick="showTab('tab-2026-04-17', this)">2026-04-17</button><button class="tab-btn " onclick="showTab('tab-2026-04-16', this)">2026-04-16</button><button class="tab-btn " onclick="showTab('tab-2026-04-15', this)">2026-04-15</button><button class="tab-btn " onclick="showTab('tab-2026-04-14', this)">2026-04-14</button>
        </div>
        <div id="tab-2026-04-20" class="tab-content active"><iframe src="briefings/2026-04-20.html" width="100%" height="800px"></iframe></div><div id="tab-2026-04-19" class="tab-content "><iframe src="briefings/2026-04-19.html" width="100%" height="800px"></iframe></div><div id="tab-2026-04-18" class="tab-content "><iframe src="briefings/2026-04-18.html" width="100%" height="800px"></iframe></div><div id="tab-2026-04-17" class="tab-content "><iframe src="briefings/2026-04-17.html" width="100%" height="800px"></iframe></div><div id="tab-2026-04-16" class="tab-content "><iframe src="briefings/2026-04-16.html" width="100%" height="800px"></iframe></div><div id="tab-2026-04-15" class="tab-content "><iframe src="briefings/2026-04-15.html" width="100%" height="800px"></iframe></div><div id="tab-2026-04-14" class="tab-content "><iframe src="briefings/2026-04-14.html" width="100%" height="800px"></iframe></div>
    </body>
